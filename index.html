<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress benign Vite websocket errors in development
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('[vite] failed to connect to websocket')) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' ||
          (typeof event.reason === 'string' && event.reason.includes('WebSocket closed without opened'))
        )) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
